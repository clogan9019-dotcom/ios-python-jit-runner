name: iPyRunner

options:
  bundleIdPrefix: com.clogan.ipyrunner
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    AD_HOC_CODE_SIGNING_ALLOWED: YES

targets:
  iPyRunner:
    type: application
    platform: iOS
    sources:
      - path: Sources/iPyRunnerApp
      - path: Sources/iPyRunnerCore
    resources:
      - path: PythonRuntime
      - path: iPyRunner/python
      - path: iPyRunner/Assets.xcassets
    info:
      path: iPyRunner/Info.plist
    entitlements:
      path: iPyRunner/iPyRunner.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clogan.ipyrunner.app
        PRODUCT_NAME: iPyRunner
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_OBJC_BRIDGING_HEADER: iPyRunner/iPyRunner-Bridging-Header.h
        FRAMEWORK_SEARCH_PATHS: "$(SRCROOT)/Frameworks"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/Sources/iPyRunnerCore $(SRCROOT)/Frameworks/Python.xcframework/ios-arm64/Python.framework/Headers"
    dependencies:
      - framework: Frameworks/Python.xcframework
        embed: true
        codeSign: false
