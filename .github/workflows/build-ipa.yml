name: Build IPA

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build time
        run: echo "BUILD_TIME=$(TZ='America/New_York' date '+%B %d, %Y at %I:%M %p %Z')" >> $GITHUB_ENV

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_16.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d /Applications/Xcode_15.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install build tools
        run: |
          brew install xcodegen ldid

      - name: Fetch Python iOS runtime
        run: Scripts/fetch_python_ios_runtime.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Archive unsigned
        run: |
          xcodebuild archive \
            -project iPyRunner.xcodeproj \
            -scheme iPyRunner \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/iPyRunner.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Export and sign IPA with ldid
        run: |
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          APP_PATH=$(find "$RUNNER_TEMP/iPyRunner.xcarchive" -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found. Archive contents:"
            find "$RUNNER_TEMP/iPyRunner.xcarchive" -maxdepth 4 -print
            exit 1
          fi

          echo "Found app: $APP_PATH"
          cp -r "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"

          BINARY="$RUNNER_TEMP/ipa/Payload/iPyRunner.app/iPyRunner"
          echo "Signing binary with ldid: $BINARY"
          ldid -SiPyRunner/iPyRunner.entitlements "$BINARY"

          cd "$RUNNER_TEMP/ipa"
          zip -r "$RUNNER_TEMP/iPyRunner.ipa" Payload
          ls -lh "$RUNNER_TEMP/iPyRunner.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iPyRunner-ipa
          path: ${{ runner.temp }}/iPyRunner.ipa

      - name: Publish IPA — Latest Build main branch
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          make_latest: false
          files: ${{ runner.temp }}/iPyRunner.ipa
          body: |
            Rolling build from the latest commit on `main`.

            Built: ${{ env.BUILD_TIME }}

            Unsigned/ad-hoc IPA. Sideload with your preferred non-App-Store workflow.

      - name: Publish IPA — Versioned Release tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: iPyRunner ${{ github.ref_name }}
          files: ${{ runner.temp }}/iPyRunner.ipa
          body: |
            ## iPyRunner ${{ github.ref_name }}

            Unsigned/ad-hoc IPA. Sideload with your preferred non-App-Store workflow.
          draft: false
          prerelease: false
